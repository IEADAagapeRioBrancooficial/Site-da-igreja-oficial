<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bíblia Sagrada – IEADA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#b71c1c;--red-d:#7f0000;--gold:#c9a84c;--gold-lt:#f0c040;
  --yellow:#ffd600;--dark:#0f0800;--dark2:#1a1000;--cream:#fdf8ee;
  --green:#1d9e75;
}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Lato',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--dark2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}

/* ── HEADER ── */
#site-header{
  position:fixed;top:0;left:0;width:100%;z-index:200;
  background:linear-gradient(135deg,rgba(15,8,0,.97),rgba(127,0,0,.97));
  border-bottom:2px solid var(--gold);
  backdrop-filter:blur(8px);
}
.hdr-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-logo img{height:44px;width:44px;object-fit:contain;filter:drop-shadow(0 0 6px var(--gold))}
.hdr-logo-text{display:flex;flex-direction:column}
.hdr-logo-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold-lt);font-weight:700;letter-spacing:.05em}
.hdr-logo-sub{font-size:.7rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase}
.hdr-back{
  font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);
  text-decoration:none;border:1px solid rgba(201,168,76,.4);
  padding:7px 16px;border-radius:20px;transition:background .2s;
}
.hdr-back:hover{background:rgba(201,168,76,.12)}

/* ── HERO ── */
.bible-hero{
  padding:100px 20px 50px;
  text-align:center;
  background:radial-gradient(ellipse at 50% 0%,#4a0000,var(--dark) 70%);
  border-bottom:1px solid rgba(201,168,76,.2);
}
.bible-hero img{width:90px;height:90px;object-fit:contain;margin-bottom:14px;filter:drop-shadow(0 0 16px rgba(201,168,76,.5))}
.bible-hero h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,3rem);color:var(--gold-lt);letter-spacing:.06em;margin-bottom:8px}
.bible-hero p{font-size:.95rem;color:rgba(253,248,238,.55);letter-spacing:.08em;font-family:'Cinzel',serif}

/* ── SEARCH BAR ── */
.search-wrap{max-width:500px;margin:28px auto 0;position:relative}
.search-wrap input{
  width:100%;padding:13px 46px 13px 18px;
  background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.3);
  border-radius:30px;color:var(--cream);font-size:.95rem;outline:none;
  font-family:'Lato',sans-serif;transition:border-color .25s;
}
.search-wrap input:focus{border-color:var(--gold)}
.search-wrap input::placeholder{color:rgba(253,248,238,.35)}
.search-wrap .s-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:1rem}

/* ── TESTAMENTO TABS ── */
.testament-tabs{
  display:flex;justify-content:center;gap:12px;
  padding:28px 20px 0;max-width:1200px;margin:0 auto;
}
.tab-btn{
  padding:10px 32px;border-radius:30px;
  font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.08em;
  cursor:pointer;transition:all .25s;border:1px solid rgba(201,168,76,.35);
  background:rgba(255,255,255,.05);color:var(--cream);
}
.tab-btn.active{background:linear-gradient(135deg,var(--red),var(--red-d));border-color:var(--gold);color:var(--gold-lt)}

/* ── BOOKS GRID ── */
.section-label{
  text-align:center;font-family:'Cinzel',serif;font-size:.75rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--gold);
  padding:24px 20px 12px;
}
.books-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;padding:0 20px 40px;max-width:1200px;margin:0 auto;
}
.book-card{
  background:linear-gradient(160deg,rgba(183,28,28,.2),rgba(15,8,0,.85));
  border:1px solid rgba(201,168,76,.25);border-radius:12px;
  padding:18px 14px;text-align:center;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;
}
.book-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  opacity:0;transition:opacity .3s;
}
.book-card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 8px 30px rgba(183,28,28,.3)}
.book-card:hover::before{opacity:1}
.book-card .b-num{font-size:.7rem;color:var(--gold);letter-spacing:.1em;margin-bottom:6px;font-family:'Cinzel',serif}
.book-card .b-name{font-family:'Cinzel',serif;font-size:.9rem;color:var(--cream);font-weight:600;line-height:1.3}
.book-card .b-chaps{font-size:.72rem;color:rgba(253,248,238,.4);margin-top:6px}
.book-card.hidden{display:none}

/* ── CHAPTER VIEW ── */
#chapter-view{display:none;padding:80px 20px 40px;min-height:100vh}
.cv-inner{max-width:760px;margin:0 auto}
.cv-breadcrumb{
  display:flex;align-items:center;gap:8px;margin-bottom:20px;
  font-size:.82rem;color:rgba(253,248,238,.5);font-family:'Cinzel',serif;
}
.cv-breadcrumb span{color:var(--gold);cursor:pointer}
.cv-breadcrumb span:hover{text-decoration:underline}
.cv-title{
  font-family:'Cinzel',serif;font-size:clamp(1.4rem,4vw,2.2rem);
  color:var(--gold-lt);margin-bottom:6px;text-align:center;
}
.cv-subtitle{text-align:center;font-size:.85rem;color:rgba(253,248,238,.45);letter-spacing:.1em;margin-bottom:28px;font-family:'Cinzel',serif}

/* Chapter nav */
.chap-nav{
  display:flex;flex-wrap:wrap;gap:8px;
  justify-content:center;margin-bottom:32px;
  padding:16px;background:rgba(0,0,0,.25);border-radius:10px;
  border:1px solid rgba(201,168,76,.15);
}
.chap-btn{
  width:38px;height:38px;border-radius:8px;
  border:1px solid rgba(201,168,76,.25);
  background:rgba(255,255,255,.05);
  color:var(--cream);font-size:.82rem;cursor:pointer;
  font-family:'Cinzel',serif;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.chap-btn:hover{background:rgba(201,168,76,.2);border-color:var(--gold)}
.chap-btn.active{background:linear-gradient(135deg,var(--red),var(--red-d));border-color:var(--gold);color:var(--gold-lt)}

/* Verses */
.verses-container{margin-top:8px}
.verse-block{
  display:flex;gap:16px;
  padding:18px 0;
  border-bottom:1px solid rgba(201,168,76,.08);
  transition:background .2s;border-radius:8px;
  cursor:pointer;
}
.verse-block:hover{background:rgba(201,168,76,.05);padding-left:10px;padding-right:10px}
.verse-block.highlighted{background:rgba(201,168,76,.1);border-left:3px solid var(--gold);padding-left:14px}
.v-num{
  font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);
  min-width:28px;padding-top:4px;font-weight:600;flex-shrink:0;
  letter-spacing:.05em;
}
.v-text{
  font-size:1.15rem;line-height:1.85;color:var(--cream);
  font-family:'Lato',serif;letter-spacing:.01em;
}
.loading-verses{
  text-align:center;padding:60px 20px;
  color:var(--gold);font-family:'Cinzel',serif;font-size:1rem;
  letter-spacing:.1em;
}
.loading-verses .spin{display:inline-block;animation:spin 1s linear infinite;font-size:1.8rem;display:block;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Nav arrows */
.chapter-arrows{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:36px;padding-top:24px;
  border-top:1px solid rgba(201,168,76,.15);
}
.arr-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 22px;border-radius:8px;
  border:1px solid rgba(201,168,76,.3);
  background:rgba(183,28,28,.25);color:var(--gold-lt);
  font-family:'Cinzel',serif;font-size:.82rem;cursor:pointer;
  transition:all .25s;letter-spacing:.06em;
}
.arr-btn:hover{background:rgba(183,28,28,.5);border-color:var(--gold)}
.arr-btn:disabled{opacity:.25;cursor:default}
.arr-center{font-family:'Cinzel',serif;font-size:.82rem;color:var(--gold);letter-spacing:.08em}

/* ── FONT SIZE CONTROL ── */
.font-control{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:20px;
}
.font-control label{font-size:.8rem;color:rgba(253,248,238,.5);font-family:'Cinzel',serif;letter-spacing:.06em}
.fc-btn{
  width:32px;height:32px;border-radius:8px;
  border:1px solid rgba(201,168,76,.3);background:rgba(255,255,255,.05);
  color:var(--gold-lt);cursor:pointer;font-size:1rem;
  transition:background .2s;display:flex;align-items:center;justify-content:center;
}
.fc-btn:hover{background:rgba(201,168,76,.2)}
.fc-size{font-family:'Cinzel',serif;font-size:.82rem;color:var(--gold);min-width:36px;text-align:center}

/* ── FOOTER ── */
.bible-footer{
  text-align:center;padding:28px;
  border-top:1px solid rgba(201,168,76,.15);
  font-size:.78rem;color:rgba(253,248,238,.25);
  font-family:'Cinzel',serif;letter-spacing:.06em;
}

@media(max-width:600px){
  .books-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .v-text{font-size:1rem}
  .chap-btn{width:34px;height:34px;font-size:.75rem}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="site-header">
  <div class="hdr-inner">
    <a href="index.html" class="hdr-logo">
      <img src="logo.png" alt="Logo IEADA"/>
      <div class="hdr-logo-text">
        <span class="hdr-logo-title">Bíblia Sagrada</span>
        <span class="hdr-logo-sub">IEADA – Assembleia de Deus</span>
      </div>
    </a>
    <a href="index.html" class="hdr-back">← Voltar ao Site</a>
  </div>
</header>

<!-- BOOKS SCREEN -->
<div id="books-screen">
  <div class="bible-hero">
    <img src="logo.png" alt="Logo IEADA"/>
    <h1>Bíblia Sagrada</h1>
    <p>Almeida Revista e Corrigida • 66 Livros</p>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar livro..." oninput="filterBooks()"/>
      <span class="s-icon">🔍</span>
    </div>
  </div>

  <div class="testament-tabs">
    <button class="tab-btn active" onclick="showTestament('at')">Antigo Testamento</button>
    <button class="tab-btn" onclick="showTestament('nt')">Novo Testamento</button>
    <button class="tab-btn" onclick="showTestament('all')">Todos</button>
  </div>

  <div class="section-label" id="section-label">✦ Antigo Testamento – 39 Livros ✦</div>
  <div class="books-grid" id="booksGrid"></div>
</div>

<!-- CHAPTER VIEW -->
<div id="chapter-view">
  <div class="cv-inner">
    <div class="cv-breadcrumb">
      <span onclick="goBack()">📚 Todos os Livros</span>
      <span style="color:rgba(253,248,238,.3)">›</span>
      <span id="bc-book" style="cursor:default;color:var(--cream)"></span>
      <span style="color:rgba(253,248,238,.3)">›</span>
      <span id="bc-chap" style="cursor:default;color:rgba(253,248,238,.5)"></span>
    </div>

    <div class="cv-title" id="cv-title"></div>
    <div class="cv-subtitle" id="cv-subtitle"></div>

    <div class="font-control">
      <label>Tamanho do texto</label>
      <button class="fc-btn" onclick="changeFontSize(-1)">−</button>
      <span class="fc-size" id="fcSize">18px</span>
      <button class="fc-btn" onclick="changeFontSize(1)">+</button>
    </div>

    <div class="chap-nav" id="chapNav"></div>
    <div class="verses-container" id="versesContainer"></div>
    <div class="chapter-arrows" id="chapterArrows"></div>
  </div>
</div>

<div class="bible-footer">✝ IEADA – Bíblia Sagrada Almeida Revista e Corrigida · Domínio Público</div>

<script>
// ── LIVROS DA BÍBLIA ────────────────────────────────
const BOOKS = [
  // Antigo Testamento
  {id:"gn",  name:"Gênesis",        abbr:"Gn",  chaps:50, t:"at"},
  {id:"ex",  name:"Êxodo",          abbr:"Ex",  chaps:40, t:"at"},
  {id:"lv",  name:"Levítico",       abbr:"Lv",  chaps:27, t:"at"},
  {id:"nm",  name:"Números",        abbr:"Nm",  chaps:36, t:"at"},
  {id:"dt",  name:"Deuteronômio",   abbr:"Dt",  chaps:34, t:"at"},
  {id:"js",  name:"Josué",          abbr:"Js",  chaps:24, t:"at"},
  {id:"jz",  name:"Juízes",         abbr:"Jz",  chaps:21, t:"at"},
  {id:"rt",  name:"Rute",           abbr:"Rt",  chaps:4,  t:"at"},
  {id:"1sm", name:"1 Samuel",       abbr:"1Sm", chaps:31, t:"at"},
  {id:"2sm", name:"2 Samuel",       abbr:"2Sm", chaps:24, t:"at"},
  {id:"1rs", name:"1 Reis",         abbr:"1Rs", chaps:22, t:"at"},
  {id:"2rs", name:"2 Reis",         abbr:"2Rs", chaps:25, t:"at"},
  {id:"1cr", name:"1 Crônicas",     abbr:"1Cr", chaps:29, t:"at"},
  {id:"2cr", name:"2 Crônicas",     abbr:"2Cr", chaps:36, t:"at"},
  {id:"ed",  name:"Esdras",         abbr:"Ed",  chaps:10, t:"at"},
  {id:"ne",  name:"Neemias",        abbr:"Ne",  chaps:13, t:"at"},
  {id:"et",  name:"Ester",          abbr:"Et",  chaps:10, t:"at"},
  {id:"jo",  name:"Jó",             abbr:"Jó",  chaps:42, t:"at"},
  {id:"sl",  name:"Salmos",         abbr:"Sl",  chaps:150,t:"at"},
  {id:"pv",  name:"Provérbios",     abbr:"Pv",  chaps:31, t:"at"},
  {id:"ec",  name:"Eclesiastes",    abbr:"Ec",  chaps:12, t:"at"},
  {id:"ct",  name:"Cantares",       abbr:"Ct",  chaps:8,  t:"at"},
  {id:"is",  name:"Isaías",         abbr:"Is",  chaps:66, t:"at"},
  {id:"jr",  name:"Jeremias",       abbr:"Jr",  chaps:52, t:"at"},
  {id:"lm",  name:"Lamentações",    abbr:"Lm",  chaps:5,  t:"at"},
  {id:"ez",  name:"Ezequiel",       abbr:"Ez",  chaps:48, t:"at"},
  {id:"dn",  name:"Daniel",         abbr:"Dn",  chaps:12, t:"at"},
  {id:"os",  name:"Oséias",         abbr:"Os",  chaps:14, t:"at"},
  {id:"jl",  name:"Joel",           abbr:"Jl",  chaps:3,  t:"at"},
  {id:"am",  name:"Amós",           abbr:"Am",  chaps:9,  t:"at"},
  {id:"ob",  name:"Obadias",        abbr:"Ob",  chaps:1,  t:"at"},
  {id:"jn",  name:"Jonas",          abbr:"Jn",  chaps:4,  t:"at"},
  {id:"mq",  name:"Miquéias",       abbr:"Mq",  chaps:7,  t:"at"},
  {id:"na",  name:"Naum",           abbr:"Na",  chaps:3,  t:"at"},
  {id:"hc",  name:"Habacuque",      abbr:"Hc",  chaps:3,  t:"at"},
  {id:"sf",  name:"Sofonias",       abbr:"Sf",  chaps:3,  t:"at"},
  {id:"ag",  name:"Ageu",           abbr:"Ag",  chaps:2,  t:"at"},
  {id:"zc",  name:"Zacarias",       abbr:"Zc",  chaps:14, t:"at"},
  {id:"ml",  name:"Malaquias",      abbr:"Ml",  chaps:4,  t:"at"},
  // Novo Testamento
  {id:"mt",  name:"Mateus",         abbr:"Mt",  chaps:28, t:"nt"},
  {id:"mc",  name:"Marcos",         abbr:"Mc",  chaps:16, t:"nt"},
  {id:"lc",  name:"Lucas",          abbr:"Lc",  chaps:24, t:"nt"},
  {id:"jo2", name:"João",           abbr:"Jo",  chaps:21, t:"nt"},
  {id:"at2", name:"Atos",           abbr:"At",  chaps:28, t:"nt"},
  {id:"rm",  name:"Romanos",        abbr:"Rm",  chaps:16, t:"nt"},
  {id:"1co", name:"1 Coríntios",    abbr:"1Co", chaps:16, t:"nt"},
  {id:"2co", name:"2 Coríntios",    abbr:"2Co", chaps:13, t:"nt"},
  {id:"gl",  name:"Gálatas",        abbr:"Gl",  chaps:6,  t:"nt"},
  {id:"ef",  name:"Efésios",        abbr:"Ef",  chaps:6,  t:"nt"},
  {id:"fp",  name:"Filipenses",     abbr:"Fp",  chaps:4,  t:"nt"},
  {id:"cl",  name:"Colossenses",    abbr:"Cl",  chaps:4,  t:"nt"},
  {id:"1ts", name:"1 Tessalonicenses",abbr:"1Ts",chaps:5, t:"nt"},
  {id:"2ts", name:"2 Tessalonicenses",abbr:"2Ts",chaps:3, t:"nt"},
  {id:"1tm", name:"1 Timóteo",      abbr:"1Tm", chaps:6,  t:"nt"},
  {id:"2tm", name:"2 Timóteo",      abbr:"2Tm", chaps:4,  t:"nt"},
  {id:"tt",  name:"Tito",           abbr:"Tt",  chaps:3,  t:"nt"},
  {id:"fm",  name:"Filemom",        abbr:"Fm",  chaps:1,  t:"nt"},
  {id:"hb",  name:"Hebreus",        abbr:"Hb",  chaps:13, t:"nt"},
  {id:"tg",  name:"Tiago",          abbr:"Tg",  chaps:5,  t:"nt"},
  {id:"1pe", name:"1 Pedro",        abbr:"1Pe", chaps:5,  t:"nt"},
  {id:"2pe", name:"2 Pedro",        abbr:"2Pe", chaps:3,  t:"nt"},
  {id:"1jo", name:"1 João",         abbr:"1Jo", chaps:5,  t:"nt"},
  {id:"2jo", name:"2 João",         abbr:"2Jo", chaps:1,  t:"nt"},
  {id:"3jo", name:"3 João",         abbr:"3Jo", chaps:1,  t:"nt"},
  {id:"jd",  name:"Judas",          abbr:"Jd",  chaps:1,  t:"nt"},
  {id:"ap",  name:"Apocalipse",     abbr:"Ap",  chaps:22, t:"nt"},
];

// Mapeamento para a API pública
const API_MAP = {
  "gn":"GEN","ex":"EXO","lv":"LEV","nm":"NUM","dt":"DEU",
  "js":"JOS","jz":"JDG","rt":"RUT","1sm":"1SA","2sm":"2SA",
  "1rs":"1KI","2rs":"2KI","1cr":"1CH","2cr":"2CH","ed":"EZR",
  "ne":"NEH","et":"EST","jo":"JOB","sl":"PSA","pv":"PRO",
  "ec":"ECC","ct":"SNG","is":"ISA","jr":"JER","lm":"LAM",
  "ez":"EZK","dn":"DAN","os":"HOS","jl":"JOL","am":"AMO",
  "ob":"OBA","jn":"JON","mq":"MIC","na":"NAM","hc":"HAB",
  "sf":"ZEP","ag":"HAG","zc":"ZEC","ml":"MAL",
  "mt":"MAT","mc":"MRK","lc":"LUK","jo2":"JHN","at2":"ACT",
  "rm":"ROM","1co":"1CO","2co":"2CO","gl":"GAL","ef":"EPH",
  "fp":"PHP","cl":"COL","1ts":"1TH","2ts":"2TH","1tm":"1TI",
  "2tm":"2TI","tt":"TIT","fm":"PHM","hb":"HEB","tg":"JAS",
  "1pe":"1PE","2pe":"2PE","1jo":"1JN","2jo":"2JN","3jo":"3JN",
  "jd":"JUD","ap":"REV"
};

// ── STATE ────────────────────────────────────────────
let curBook = null, curChap = 1, fontSize = 18, curTestament = "at";

// ── RENDER BOOKS ────────────────────────────────────
function renderBooks() {
  const grid = document.getElementById("booksGrid");
  grid.innerHTML = "";
  BOOKS.forEach((b, idx) => {
    const div = document.createElement("div");
    div.className = "book-card" + (b.t !== curTestament && curTestament !== "all" ? " hidden" : "");
    div.dataset.t = b.t;
    div.dataset.name = b.name.toLowerCase();
    div.innerHTML =
      '<div class="b-num">' + (idx+1) + '</div>' +
      '<div class="b-name">' + b.name + '</div>' +
      '<div class="b-chaps">' + b.chaps + ' capítulos</div>';
    div.onclick = () => openBook(b);
    grid.appendChild(div);
  });
}

function showTestament(t) {
  curTestament = t;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  const labels = {at:"✦ Antigo Testamento – 39 Livros ✦", nt:"✦ Novo Testamento – 27 Livros ✦", all:"✦ Todos os Livros – 66 ✦"};
  document.getElementById("section-label").textContent = labels[t];
  document.querySelectorAll(".book-card").forEach(c => {
    c.classList.toggle("hidden", t !== "all" && c.dataset.t !== t);
  });
  filterBooks();
}

function filterBooks() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".book-card").forEach(c => {
    const match = c.dataset.name.includes(q);
    if (!match) c.classList.add("hidden");
    else if (curTestament === "all" || c.dataset.t === curTestament) c.classList.remove("hidden");
  });
}

// ── OPEN BOOK ───────────────────────────────────────
function openBook(book) {
  curBook = book;
  curChap = 1;
  document.getElementById("books-screen").style.display = "none";
  document.getElementById("chapter-view").style.display = "block";
  window.scrollTo(0,0);
  renderChapterView();
}

function goBack() {
  document.getElementById("books-screen").style.display = "block";
  document.getElementById("chapter-view").style.display = "none";
  window.scrollTo(0,0);
}

// ── CHAPTER VIEW ────────────────────────────────────
function renderChapterView() {
  document.getElementById("cv-title").textContent = curBook.name;
  document.getElementById("cv-subtitle").textContent = "Capítulo " + curChap;
  document.getElementById("bc-book").textContent = curBook.name;
  document.getElementById("bc-chap").textContent = "Capítulo " + curChap;

  // Chapter buttons
  const nav = document.getElementById("chapNav");
  nav.innerHTML = "";
  for (let i = 1; i <= curBook.chaps; i++) {
    const btn = document.createElement("button");
    btn.className = "chap-btn" + (i === curChap ? " active" : "");
    btn.textContent = i;
    btn.onclick = () => { curChap = i; renderChapterView(); };
    nav.appendChild(btn);
  }

  loadVerses();
  renderArrows();
}

// ── LOAD VERSES via API ──────────────────────────────
async function loadVerses() {
  const container = document.getElementById("versesContainer");
  container.innerHTML = '<div class="loading-verses"><span class="spin">✝</span>Carregando versículos...</div>';

  const bookCode = API_MAP[curBook.id];
  const url = "https://cdn.jsdelivr.net/gh/thiagobodruk/biblia@master/json/arc/" + bookCode.toLowerCase() + ".json";

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("not found");
    const data = await res.json();

    // data is array of chapters, each chapter is array of verses
    const chapIndex = curChap - 1;
    const verses = data[chapIndex];

    if (!verses || !verses.length) throw new Error("empty");

    renderVerses(verses);
  } catch(e) {
    // fallback: try alternative CDN
    try {
      const bookCode2 = API_MAP[curBook.id];
      const url2 = "https://raw.githubusercontent.com/thiagobodruk/biblia/master/json/arc/" + bookCode2.toLowerCase() + ".json";
      const res2 = await fetch(url2);
      if (!res2.ok) throw new Error("not found 2");
      const data2 = await res2.json();
      const verses2 = data2[curChap - 1];
      if (!verses2 || !verses2.length) throw new Error("empty 2");
      renderVerses(verses2);
    } catch(e2) {
      container.innerHTML =
        '<div class="loading-verses" style="color:rgba(253,248,238,.4)">' +
        '⚠ Não foi possível carregar os versículos.<br>' +
        '<small style="font-size:.8rem;margin-top:8px;display:block">Verifique sua conexão com a internet.</small>' +
        '</div>';
    }
  }
}

function renderVerses(verses) {
  const container = document.getElementById("versesContainer");
  container.innerHTML = "";
  verses.forEach((text, i) => {
    const div = document.createElement("div");
    div.className = "verse-block";
    div.innerHTML =
      '<div class="v-num">' + (i+1) + '</div>' +
      '<div class="v-text" style="font-size:' + fontSize + 'px">' + text + '</div>';
    div.onclick = () => div.classList.toggle("highlighted");
    container.appendChild(div);
  });
  document.getElementById("cv-subtitle").textContent = "Capítulo " + curChap + " · " + verses.length + " versículos";
}

// ── ARROWS ───────────────────────────────────────────
function renderArrows() {
  const el = document.getElementById("chapterArrows");
  el.innerHTML =
    '<button class="arr-btn" onclick="prevChap()" ' + (curChap<=1?"disabled":"") + '>← Capítulo ' + (curChap-1) + '</button>' +
    '<span class="arr-center">' + curChap + ' / ' + curBook.chaps + '</span>' +
    '<button class="arr-btn" onclick="nextChap()" ' + (curChap>=curBook.chaps?"disabled":"") + '>Capítulo ' + (curChap+1) + ' →</button>';
}

function prevChap() { if(curChap>1){curChap--;renderChapterView();window.scrollTo(0,0);} }
function nextChap() { if(curChap<curBook.chaps){curChap++;renderChapterView();window.scrollTo(0,0);} }

// ── FONT SIZE ────────────────────────────────────────
function changeFontSize(d) {
  fontSize = Math.max(14, Math.min(28, fontSize + d));
  document.getElementById("fcSize").textContent = fontSize + "px";
  document.querySelectorAll(".v-text").forEach(v => v.style.fontSize = fontSize + "px");
}
