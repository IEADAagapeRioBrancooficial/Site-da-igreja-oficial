<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bíblia Sagrada – IEADA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#b71c1c;--red-d:#7f0000;--gold:#c9a84c;--gold-lt:#f0c040;--dark:#0f0800;--dark2:#1a1000;--cream:#fdf8ee;--green:#1d9e75;--danger:#e24b4a}
html{scroll-behavior:smooth}
body{background:var(--dark);color:var(--cream);font-family:'Lato',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-track{background:var(--dark2)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}

/* HEADER */
#hdr{position:fixed;top:0;left:0;width:100%;z-index:200;background:linear-gradient(135deg,rgba(15,8,0,.97),rgba(127,0,0,.97));border-bottom:2px solid var(--gold);backdrop-filter:blur(8px)}
.hi{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:10px 20px}
.hl{display:flex;align-items:center;gap:10px;text-decoration:none}
.hl img{height:42px;width:42px;object-fit:contain;filter:drop-shadow(0 0 6px var(--gold))}
.hl-t{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold-lt);font-weight:700;letter-spacing:.05em;display:block}
.hl-s{font-size:.68rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;display:block}
.hb{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);text-decoration:none;border:1px solid rgba(201,168,76,.4);padding:6px 14px;border-radius:20px;transition:background .2s}
.hb:hover{background:rgba(201,168,76,.12)}

/* HERO */
.hero{padding:90px 20px 42px;text-align:center;background:radial-gradient(ellipse at 50% 0%,#4a0000,var(--dark) 70%);border-bottom:1px solid rgba(201,168,76,.2)}
.hero img{width:80px;height:80px;object-fit:contain;margin-bottom:12px;filter:drop-shadow(0 0 16px rgba(201,168,76,.5))}
.hero h1{font-family:'Cinzel',serif;font-size:clamp(1.7rem,5vw,2.8rem);color:var(--gold-lt);letter-spacing:.06em;margin-bottom:6px}
.hero p{font-size:.88rem;color:rgba(253,248,238,.5);letter-spacing:.08em;font-family:'Cinzel',serif}
.sw{max-width:480px;margin:22px auto 0;position:relative}
.sw input{width:100%;padding:12px 44px 12px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.3);border-radius:28px;color:var(--cream);font-size:.92rem;outline:none;font-family:'Lato',sans-serif;transition:border-color .25s}
.sw input:focus{border-color:var(--gold)}.sw input::placeholder{color:rgba(253,248,238,.35)}
.sw .si{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:.95rem}

/* TABS */
.tabs{display:flex;justify-content:center;gap:10px;padding:24px 20px 0;max-width:1200px;margin:0 auto}
.tb{padding:9px 28px;border-radius:28px;font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.08em;cursor:pointer;transition:all .25s;border:1px solid rgba(201,168,76,.3);background:rgba(255,255,255,.04);color:var(--cream)}
.tb.active{background:linear-gradient(135deg,var(--red),var(--red-d));border-color:var(--gold);color:var(--gold-lt)}
.sl{text-align:center;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);padding:22px 20px 10px}

/* GRID */
.bg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;padding:0 20px 48px;max-width:1200px;margin:0 auto}
.bc{background:linear-gradient(160deg,rgba(183,28,28,.18),rgba(15,8,0,.85));border:1px solid rgba(201,168,76,.22);border-radius:11px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.bc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s}
.bc:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 8px 30px rgba(183,28,28,.3)}.bc:hover::before{opacity:1}
.bc.hidden{display:none}
.bn{font-size:.68rem;color:var(--gold);letter-spacing:.1em;margin-bottom:5px;font-family:'Cinzel',serif}
.bname{font-family:'Cinzel',serif;font-size:.85rem;color:var(--cream);font-weight:600;line-height:1.3}
.bch{font-size:.7rem;color:rgba(253,248,238,.38);margin-top:5px}

/* CHAPTER VIEW */
#cv{display:none;padding:76px 20px 40px;min-height:100vh}
.cvi{max-width:740px;margin:0 auto}
.cbr{display:flex;align-items:center;gap:7px;margin-bottom:18px;font-size:.78rem;color:rgba(253,248,238,.45);font-family:'Cinzel',serif;flex-wrap:wrap}
.cbr span{color:var(--gold);cursor:pointer}.cbr span:hover{text-decoration:underline}
.cvt{font-family:'Cinzel',serif;font-size:clamp(1.3rem,4vw,2rem);color:var(--gold-lt);margin-bottom:5px;text-align:center}
.cvs{text-align:center;font-size:.82rem;color:rgba(253,248,238,.4);letter-spacing:.1em;margin-bottom:24px;font-family:'Cinzel',serif}

/* Font control */
.fc{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px}
.fc label{font-size:.75rem;color:rgba(253,248,238,.45);font-family:'Cinzel',serif;letter-spacing:.06em}
.fcb{width:30px;height:30px;border-radius:7px;border:1px solid rgba(201,168,76,.28);background:rgba(255,255,255,.04);color:var(--gold-lt);cursor:pointer;font-size:.95rem;transition:background .2s;display:flex;align-items:center;justify-content:center}
.fcb:hover{background:rgba(201,168,76,.18)}.fcs{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);min-width:34px;text-align:center}

/* Chapter nav */
.cn{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:28px;padding:14px;background:rgba(0,0,0,.22);border-radius:10px;border:1px solid rgba(201,168,76,.12)}
.cb{width:36px;height:36px;border-radius:7px;border:1px solid rgba(201,168,76,.22);background:rgba(255,255,255,.04);color:var(--cream);font-size:.78rem;cursor:pointer;font-family:'Cinzel',serif;transition:all .2s;display:flex;align-items:center;justify-content:center}
.cb:hover{background:rgba(201,168,76,.18);border-color:var(--gold)}.cb.active{background:linear-gradient(135deg,var(--red),var(--red-d));border-color:var(--gold);color:var(--gold-lt)}

/* Verses */
.vc .vb{display:flex;gap:14px;padding:16px 8px;border-bottom:1px solid rgba(201,168,76,.07);transition:background .2s,padding .2s;border-radius:7px;cursor:pointer}
.vb:hover{background:rgba(201,168,76,.05);padding-left:12px}
.vb.hl{background:rgba(201,168,76,.1);border-left:3px solid var(--gold);padding-left:14px}
.vn{font-family:'Cinzel',serif;font-size:.75rem;color:var(--gold);min-width:26px;padding-top:3px;font-weight:600;flex-shrink:0;letter-spacing:.04em}
.vt{font-size:18px;line-height:1.9;color:var(--cream);letter-spacing:.01em}

/* Loading */
.lv{text-align:center;padding:52px 20px;color:var(--gold);font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.1em}
.lv .sp{display:block;font-size:1.6rem;margin-bottom:10px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Arrows */
.ca{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(201,168,76,.13)}
.ab{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:7px;border:1px solid rgba(201,168,76,.28);background:rgba(183,28,28,.22);color:var(--gold-lt);font-family:'Cinzel',serif;font-size:.78rem;cursor:pointer;transition:all .22s;letter-spacing:.06em}
.ab:hover{background:rgba(183,28,28,.45);border-color:var(--gold)}.ab:disabled{opacity:.22;cursor:default}
.ac{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);letter-spacing:.08em}

/* Error/Notice */
.book-notice{text-align:center;padding:40px 20px;color:rgba(253,248,238,.4);font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.06em;line-height:1.8}
.err-box{background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.4);border-radius:10px;padding:20px;text-align:center;font-family:'Cinzel',serif;font-size:.85rem;color:var(--danger);letter-spacing:.06em;line-height:1.8}

/* Initial loading overlay */
#init-load{position:fixed;inset:0;background:var(--dark);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#init-load img{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(201,168,76,.6));animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
#init-load p{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold);letter-spacing:.18em}
.prog-bar{width:220px;height:3px;background:rgba(201,168,76,.15);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(to right,var(--red),var(--gold));border-radius:2px;width:0;transition:width .4s ease}

/* Footer */
.ft{text-align:center;padding:24px;border-top:1px solid rgba(201,168,76,.12);font-size:.74rem;color:rgba(253,248,238,.22);font-family:'Cinzel',serif;letter-spacing:.06em}

@media(max-width:580px){
  .bg{grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:9px}
  .vt{font-size:16px!important}
  .cb{width:32px;height:32px;font-size:.72rem}
}
</style>
</head>
<body>

<!-- Initial loading overlay -->
<div id="init-load">
  <img src="logo.png" alt="IEADA"/>
  <p>Carregando a Bíblia Sagrada...</p>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
</div>

<header id="hdr">
  <div class="hi">
    <a href="index.html" class="hl">
      <img src="logo.png" alt="IEADA"/>
      <div><span class="hl-t">Bíblia Sagrada</span><span class="hl-s">IEADA – Assembleia de Deus</span></div>
    </a>
    <a href="index.html" class="hb">← Voltar ao Site</a>
  </div>
</header>

<div id="bs" style="display:none">
  <div class="hero">
    <img src="logo.png" alt="Logo IEADA"/>
    <h1>Bíblia Sagrada</h1>
    <p>Almeida Revista e Corrigida • 66 Livros</p>
    <div class="sw">
      <input type="text" id="si" placeholder="Buscar livro..." autocomplete="off" oninput="filterBooks()"/>
      <span class="si">🔍</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tb active" onclick="showT('at',this)">Antigo Testamento</button>
    <button class="tb" onclick="showT('nt',this)">Novo Testamento</button>
    <button class="tb" onclick="showT('all',this)">Todos os Livros</button>
  </div>
  <div class="sl" id="sl">✦ Antigo Testamento – 39 Livros ✦</div>
  <div class="bg" id="bg"></div>
</div>

<div id="cv">
  <div class="cvi">
    <div class="cbr">
      <span onclick="goBack()">📚 Todos os Livros</span>
      <span style="color:rgba(253,248,238,.28)">›</span>
      <span id="bb" style="cursor:default;color:var(--cream)"></span>
      <span style="color:rgba(253,248,238,.28)">›</span>
      <span id="bc-lbl" style="cursor:default;color:rgba(253,248,238,.45)"></span>
    </div>
    <div class="cvt" id="cvt"></div>
    <div class="cvs" id="cvs"></div>
    <div class="fc">
      <label>Tamanho</label>
      <button class="fcb" onclick="chgFs(-1)">−</button>
      <span class="fcs" id="fcs">18px</span>
      <button class="fcb" onclick="chgFs(1)">+</button>
    </div>
    <div class="cn" id="cn"></div>
    <div class="vc" id="vc"></div>
    <div class="ca" id="ca"></div>
  </div>
</div>

<div class="ft">✝ IEADA – Bíblia Sagrada • Almeida Revista e Corrigida</div>

<script>
// ── Book list (metadata only, no text) ────────────────────────────────────
const BOOKS = [
  {id:"GN", name:"Gênesis",            abbr:"Gn",  chaps:50,  t:"at"},
  {id:"EX", name:"Êxodo",              abbr:"Ex",  chaps:40,  t:"at"},
  {id:"LV", name:"Levítico",           abbr:"Lv",  chaps:27,  t:"at"},
  {id:"NM", name:"Números",            abbr:"Nm",  chaps:36,  t:"at"},
  {id:"DT", name:"Deuteronômio",       abbr:"Dt",  chaps:34,  t:"at"},
  {id:"JS", name:"Josué",              abbr:"Js",  chaps:24,  t:"at"},
  {id:"JZ", name:"Juízes",             abbr:"Jz",  chaps:21,  t:"at"},
  {id:"RT", name:"Rute",               abbr:"Rt",  chaps:4,   t:"at"},
  {id:"1SM",name:"1 Samuel",           abbr:"1Sm", chaps:31,  t:"at"},
  {id:"2SM",name:"2 Samuel",           abbr:"2Sm", chaps:24,  t:"at"},
  {id:"1RS",name:"1 Reis",             abbr:"1Rs", chaps:22,  t:"at"},
  {id:"2RS",name:"2 Reis",             abbr:"2Rs", chaps:25,  t:"at"},
  {id:"1CR",name:"1 Crônicas",         abbr:"1Cr", chaps:29,  t:"at"},
  {id:"2CR",name:"2 Crônicas",         abbr:"2Cr", chaps:36,  t:"at"},
  {id:"ED", name:"Esdras",             abbr:"Ed",  chaps:10,  t:"at"},
  {id:"NE", name:"Neemias",            abbr:"Ne",  chaps:13,  t:"at"},
  {id:"ET", name:"Ester",              abbr:"Et",  chaps:10,  t:"at"},
  {id:"JOB",name:"Jó",                 abbr:"Jó",  chaps:42,  t:"at"},
  {id:"SL", name:"Salmos",             abbr:"Sl",  chaps:150, t:"at"},
  {id:"PV", name:"Provérbios",         abbr:"Pv",  chaps:31,  t:"at"},
  {id:"EC", name:"Eclesiastes",        abbr:"Ec",  chaps:12,  t:"at"},
  {id:"CT", name:"Cantares",           abbr:"Ct",  chaps:8,   t:"at"},
  {id:"IS", name:"Isaías",             abbr:"Is",  chaps:66,  t:"at"},
  {id:"JR", name:"Jeremias",           abbr:"Jr",  chaps:52,  t:"at"},
  {id:"LM", name:"Lamentações",        abbr:"Lm",  chaps:5,   t:"at"},
  {id:"EZ", name:"Ezequiel",           abbr:"Ez",  chaps:48,  t:"at"},
  {id:"DN", name:"Daniel",             abbr:"Dn",  chaps:12,  t:"at"},
  {id:"OS", name:"Oséias",             abbr:"Os",  chaps:14,  t:"at"},
  {id:"JL", name:"Joel",               abbr:"Jl",  chaps:3,   t:"at"},
  {id:"AM", name:"Amós",               abbr:"Am",  chaps:9,   t:"at"},
  {id:"OB", name:"Obadias",            abbr:"Ob",  chaps:1,   t:"at"},
  {id:"JN", name:"Jonas",              abbr:"Jn",  chaps:4,   t:"at"},
  {id:"MQ", name:"Miquéias",           abbr:"Mq",  chaps:7,   t:"at"},
  {id:"NA", name:"Naum",               abbr:"Na",  chaps:3,   t:"at"},
  {id:"HC", name:"Habacuque",          abbr:"Hc",  chaps:3,   t:"at"},
  {id:"SF", name:"Sofonias",           abbr:"Sf",  chaps:3,   t:"at"},
  {id:"AG", name:"Ageu",               abbr:"Ag",  chaps:2,   t:"at"},
  {id:"ZC", name:"Zacarias",           abbr:"Zc",  chaps:14,  t:"at"},
  {id:"ML", name:"Malaquias",          abbr:"Ml",  chaps:4,   t:"at"},
  {id:"MT", name:"Mateus",             abbr:"Mt",  chaps:28,  t:"nt"},
  {id:"MC", name:"Marcos",             abbr:"Mc",  chaps:16,  t:"nt"},
  {id:"LC", name:"Lucas",              abbr:"Lc",  chaps:24,  t:"nt"},
  {id:"JO", name:"João",               abbr:"Jo",  chaps:21,  t:"nt"},
  {id:"AT", name:"Atos",               abbr:"At",  chaps:28,  t:"nt"},
  {id:"RM", name:"Romanos",            abbr:"Rm",  chaps:16,  t:"nt"},
  {id:"1CO",name:"1 Coríntios",        abbr:"1Co", chaps:16,  t:"nt"},
  {id:"2CO",name:"2 Coríntios",        abbr:"2Co", chaps:13,  t:"nt"},
  {id:"GL", name:"Gálatas",            abbr:"Gl",  chaps:6,   t:"nt"},
  {id:"EF", name:"Efésios",            abbr:"Ef",  chaps:6,   t:"nt"},
  {id:"FP", name:"Filipenses",         abbr:"Fp",  chaps:4,   t:"nt"},
  {id:"CL", name:"Colossenses",        abbr:"Cl",  chaps:4,   t:"nt"},
  {id:"1TS",name:"1 Tessalonicenses",  abbr:"1Ts", chaps:5,   t:"nt"},
  {id:"2TS",name:"2 Tessalonicenses",  abbr:"2Ts", chaps:3,   t:"nt"},
  {id:"1TM",name:"1 Timóteo",          abbr:"1Tm", chaps:6,   t:"nt"},
  {id:"2TM",name:"2 Timóteo",          abbr:"2Tm", chaps:4,   t:"nt"},
  {id:"TT", name:"Tito",               abbr:"Tt",  chaps:3,   t:"nt"},
  {id:"FM", name:"Filemom",            abbr:"Fm",  chaps:1,   t:"nt"},
  {id:"HB", name:"Hebreus",            abbr:"Hb",  chaps:13,  t:"nt"},
  {id:"TG", name:"Tiago",              abbr:"Tg",  chaps:5,   t:"nt"},
  {id:"1PE",name:"1 Pedro",            abbr:"1Pe", chaps:5,   t:"nt"},
  {id:"2PE",name:"2 Pedro",            abbr:"2Pe", chaps:3,   t:"nt"},
  {id:"1JO",name:"1 João",             abbr:"1Jo", chaps:5,   t:"nt"},
  {id:"2JO",name:"2 João",             abbr:"2Jo", chaps:1,   t:"nt"},
  {id:"3JO",name:"3 João",             abbr:"3Jo", chaps:1,   t:"nt"},
  {id:"JD", name:"Judas",              abbr:"Jd",  chaps:1,   t:"nt"},
  {id:"AP", name:"Apocalipse",         abbr:"Ap",  chaps:22,  t:"nt"},
];

// ── State ─────────────────────────────────────────────────────────────────
let BD = null;       // loaded from bible.json
let curB = null, curC = 1, fs = 18, curT = "at";

// ── Load bible.json ───────────────────────────────────────────────────────
(async function loadBible() {
  const fill = document.getElementById("prog-fill");
  const overlay = document.getElementById("init-load");

  // Animate progress bar while loading
  let fakeProgress = 0;
  const ticker = setInterval(() => {
    fakeProgress = Math.min(fakeProgress + Math.random() * 8, 85);
    fill.style.width = fakeProgress + "%";
  }, 120);

  try {
    const res = await fetch("bible.json");
    if (!res.ok) throw new Error("HTTP " + res.status);

    clearInterval(ticker);
    fill.style.width = "95%";

    BD = await res.json();

    fill.style.width = "100%";
    await new Promise(r => setTimeout(r, 300));

    overlay.style.transition = "opacity .4s";
    overlay.style.opacity = "0";
    await new Promise(r => setTimeout(r, 420));
    overlay.remove();

    document.getElementById("bs").style.display = "block";
    renderBooks();

  } catch (err) {
    clearInterval(ticker);
    overlay.innerHTML = `
      <img src="logo.png" alt="IEADA" style="width:60px;opacity:.5"/>
      <div class="err-box" style="max-width:380px;margin:0 16px">
        ⚠️ Não foi possível carregar a Bíblia.<br><br>
        Certifique-se de que o arquivo <strong>bible.json</strong>
        está na mesma pasta que este HTML.<br><br>
        <small style="opacity:.6">Erro: ${err.message}</small>
      </div>
    `;
  }
})();

// ── Render book grid ───────────────────────────────────────────────────────
function renderBooks() {
  const g = document.getElementById("bg");
  g.innerHTML = "";
  BOOKS.forEach((b, i) => {
    const d = document.createElement("div");
    d.className = "bc" + (b.t !== curT && curT !== "all" ? " hidden" : "");
    d.dataset.t = b.t;
    d.dataset.n = b.name.toLowerCase();
    d.innerHTML =
      '<div class="bn">' + (i + 1) + '</div>' +
      '<div class="bname">' + b.name + '</div>' +
      '<div class="bch">' + b.chaps + ' cap.</div>';
    d.onclick = () => openBook(b);
    g.appendChild(d);
  });
}

function showT(t, el) {
  curT = t;
  document.querySelectorAll(".tb").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  const lb = {
    at: "✦ Antigo Testamento – 39 Livros ✦",
    nt: "✦ Novo Testamento – 27 Livros ✦",
    all: "✦ Todos os 66 Livros ✦"
  };
  document.getElementById("sl").textContent = lb[t];
  document.querySelectorAll(".bc").forEach(c => {
    c.classList.toggle("hidden", t !== "all" && c.dataset.t !== t);
  });
  filterBooks();
}

function filterBooks() {
  const q = document.getElementById("si").value.toLowerCase();
  document.querySelectorAll(".bc").forEach(c => {
    const m = c.dataset.n.includes(q);
    if (!m) c.classList.add("hidden");
    else if (curT === "all" || c.dataset.t === curT) c.classList.remove("hidden");
  });
}

// ── Book / Chapter view ────────────────────────────────────────────────────
function openBook(b) {
  curB = b; curC = 1;
  document.getElementById("bs").style.display = "none";
  document.getElementById("cv").style.display = "block";
  window.scrollTo(0, 0);
  renderCV();
}

function goBack() {
  document.getElementById("bs").style.display = "block";
  document.getElementById("cv").style.display = "none";
  window.scrollTo(0, 0);
}

function renderCV() {
  document.getElementById("cvt").textContent = curB.name;
  document.getElementById("cvs").textContent = "Capítulo " + curC;
  document.getElementById("bb").textContent = curB.name;
  document.getElementById("bc-lbl").textContent = "Cap. " + curC;

  // Chapter buttons
  const cn = document.getElementById("cn");
  cn.innerHTML = "";
  for (let i = 1; i <= curB.chaps; i++) {
    const btn = document.createElement("button");
    btn.className = "cb" + (i === curC ? " active" : "");
    btn.textContent = i;
    btn.onclick = () => { curC = i; renderCV(); window.scrollTo(0, 0); };
    cn.appendChild(btn);
  }
  loadVerses();
  renderArrows();
}

function loadVerses() {
  const vc = document.getElementById("vc");
  const bdata = BD ? BD[curB.id] : null;

  if (!bdata || !bdata.c || !bdata.c[curC]) {
    // Highlight chapters that have data
    if (bdata && bdata.c) {
      const keys = Object.keys(bdata.c).map(Number);
      document.querySelectorAll(".cb").forEach(b => {
        if (keys.includes(parseInt(b.textContent))) {
          b.style.borderColor = "var(--gold)";
          b.style.color = "var(--gold-lt)";
        }
      });
    }
    vc.innerHTML = '<div class="book-notice">✝<br><br>Este capítulo não está disponível na sua bible.json.</div>';
    document.getElementById("cvs").textContent = "Capítulo " + curC;
    return;
  }

  const verses = bdata.c[curC];
  vc.innerHTML = "";
  verses.forEach((txt, i) => {
    const d = document.createElement("div");
    d.className = "vb";
    d.innerHTML =
      '<div class="vn">' + (i + 1) + '</div>' +
      '<div class="vt" style="font-size:' + fs + 'px">' + txt + '</div>';
    d.onclick = () => d.classList.toggle("hl");
    vc.appendChild(d);
  });
  document.getElementById("cvs").textContent =
    "Capítulo " + curC + " · " + verses.length + " versículos";
}

function renderArrows() {
  const ca = document.getElementById("ca");
  ca.innerHTML =
    '<button class="ab" onclick="pc()" ' + (curC <= 1 ? "disabled" : "") + '>← Cap. ' + (curC - 1) + '</button>' +
    '<span class="ac">' + curC + ' / ' + curB.chaps + '</span>' +
    '<button class="ab" onclick="nc()" ' + (curC >= curB.chaps ? "disabled" : "") + '>Cap. ' + (curC + 1) + ' →</button>';
}

function pc() { if (curC > 1) { curC--; renderCV(); window.scrollTo(0, 0); } }
function nc() { if (curC < curB.chaps) { curC++; renderCV(); window.scrollTo(0, 0); } }

function chgFs(d) {
  fs = Math.max(14, Math.min(28, fs + d));
  document.getElementById("fcs").textContent = fs + "px";
  document.querySelectorAll(".vt").forEach(v => v.style.fontSize = fs + "px");
}
</script>
</body>
</html>
