<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÁGAPE Bible Game – Quiz Bíblico</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red:      #b71c1c;
      --red-dark: #7f0000;
      --red-mid:  #c62828;
      --gold:     #c9a84c;
      --gold-lt:  #f0c040;
      --yellow:   #ffd600;
      --dark:     #0f0800;
      --dark2:    #1a1000;
      --cream:    #fdf8ee;
      --green:    #1d9e75;
      --danger:   #e24b4a;
    }
    html { scroll-behavior: smooth; }
    body {
      background: radial-gradient(ellipse at 60% 30%, #4a0000 0%, #1a0800 40%, #0f0800 100%);
      min-height: 100vh;
      font-family: 'Lato', sans-serif;
      color: var(--cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }

    /* ── HEADER ── */
    .game-header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(201,168,76,0.25);
    }
    .game-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .game-logo .cross { display: flex; align-items: center; }
    .game-logo .cross img { height: 38px; width: 38px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(201,168,76,0.5)); }
    .game-logo .brand { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold-lt); }
    .game-logo .sub   { font-size: 10px; color: rgba(201,168,76,0.6); letter-spacing: .1em; display: block; }
    .back-btn {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.35);
      padding: 7px 16px;
      border-radius: 20px;
      transition: background .2s;
    }
    .back-btn:hover { background: rgba(201,168,76,0.12); }

    /* ── QUIZ CONTAINER ── */
    #quiz-root {
      width: 100%;
      max-width: 680px;
      background: linear-gradient(160deg, rgba(127,0,0,0.45) 0%, rgba(15,8,0,0.95) 100%);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(183,28,28,0.25);
    }

    /* ── TELA INICIAL ── */
    .q-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 32px;
      text-align: center;
    }
    .q-start-cross { font-size: 52px; color: var(--gold); margin-bottom: 12px; text-shadow: 0 0 30px rgba(201,168,76,0.4); }
    .q-start-title { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold-lt); margin-bottom: 6px; }
    .q-start-sub   { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 4px; }
    .q-start-brand { font-size: 11px; color: rgba(201,168,76,0.55); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 36px; }
    .q-levels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-bottom: 28px;
    }
    .q-level-total {
      grid-column: 1 / -1;
      background: rgba(201,168,76,0.1);
      border-color: rgba(201,168,76,0.45);
    }
    .q-level-total:hover { background: rgba(201,168,76,0.22) !important; }
    .q-level-btn {
      padding: 18px 8px;
      border-radius: 10px;
      border: 1px solid rgba(201,168,76,0.28);
      background: rgba(255,255,255,0.05);
      color: var(--cream);
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
      line-height: 1.5;
    }
    .q-level-btn:hover { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.55); transform: translateY(-2px); }
    .q-level-btn .lv-icon { font-size: 24px; display: block; margin-bottom: 8px; }
    .q-level-btn .lv-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold-lt); display: block; }
    .q-level-btn .lv-desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; display: block; }
    .q-start-hint { font-size: 12px; color: rgba(255,255,255,0.28); }

    /* ── QUIZ HEADER ── */
    .q-header {
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .q-header-logo { display: flex; align-items: center; gap: 8px; }
    .q-header-cross { font-size: 18px; color: var(--gold); }
    .q-header-brand { font-family: 'Cinzel', serif; font-size: 12px; color: var(--gold-lt); }
    .q-header-brand span { color: rgba(255,255,255,0.4); font-size: 10px; display: block; }
    .q-menu-btn {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .q-menu-btn:hover { color: var(--gold); border-color: rgba(201,168,76,0.45); }
    .q-score-box {
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 13px;
      color: var(--gold-lt);
      font-family: 'Cinzel', serif;
    }

    /* ── QUIZ BODY ── */
    .q-body { padding: 24px 22px; }
    .q-progress-bar {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      height: 5px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .q-progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold), var(--yellow));
      border-radius: 4px;
      transition: width .4s ease;
    }
    .q-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .q-number { font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: .12em; text-transform: uppercase; }
    .q-prize {
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 20px;
      padding: 3px 14px;
      font-size: 12px;
      color: var(--gold-lt);
      font-family: 'Cinzel', serif;
    }
    .q-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.55;
      margin-bottom: 24px;
      min-height: 56px;
    }

    /* ── AJUDAS ── */
    .q-lifelines { display: flex; gap: 10px; margin-bottom: 18px; }
    .q-ll {
      flex: 1;
      padding: 9px 6px;
      background: rgba(183,28,28,0.28);
      border: 1px solid rgba(183,28,28,0.45);
      border-radius: 8px;
      color: var(--cream);
      font-size: 12px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      text-align: center;
      line-height: 1.4;
    }
    .q-ll:hover:not(:disabled) { background: rgba(183,28,28,0.5); }
    .q-ll:disabled { opacity: 0.3; cursor: default; }
    .q-ll .ll-icon { font-size: 16px; display: block; margin-bottom: 4px; }

    /* ── OPÇÕES ── */
    .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    .q-opt {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--cream);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .2s, border-color .2s, transform .15s;
      text-align: left;
      line-height: 1.4;
      font-family: 'Lato', sans-serif;
    }
    .q-opt:hover:not(:disabled) { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.55); transform: translateY(-1px); }
    .q-opt .opt-letter {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(201,168,76,0.18);
      border: 1px solid rgba(201,168,76,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: var(--gold-lt);
      flex-shrink: 0;
      font-family: 'Cinzel', serif;
    }
    .q-opt.correct { background: rgba(29,158,117,0.28); border-color: var(--green); }
    .q-opt.correct .opt-letter { background: var(--green); border-color: var(--green); color: #fff; }
    .q-opt.wrong   { background: rgba(226,75,74,0.22); border-color: var(--danger); }
    .q-opt.wrong .opt-letter { background: var(--danger); border-color: var(--danger); color: #fff; }
    .q-opt:disabled { cursor: default; transform: none; }

    /* ── FEEDBACK ── */
    .q-feedback {
      display: none;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      line-height: 1.6;
      padding: 12px 14px;
      background: rgba(0,0,0,0.28);
      border-radius: 8px;
      border-left: 3px solid rgba(201,168,76,0.4);
      margin-bottom: 14px;
    }

    /* ── BOTÃO PRÓXIMA ── */
    .q-next {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--red-mid), var(--red-dark));
      border: 1px solid var(--gold);
      border-radius: 8px;
      color: var(--gold-lt);
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: .06em;
      cursor: pointer;
      display: none;
      transition: opacity .2s, transform .15s;
    }
    .q-next:hover { opacity: .85; transform: translateY(-1px); }
    /* botões dentro do wrapper do modo total */
    .q-next-row { display: flex; gap: 10px; }
    .q-next-row .q-next { display: block; width: auto; flex: 1; }
    .q-next-row .q-next.grow2 { flex: 2; }

    /* ── TELA FINAL ── */
    .q-end {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 32px;
      text-align: center;
    }
    .q-end-icon  { font-size: 56px; margin-bottom: 14px; }
    .q-end-title { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold-lt); margin-bottom: 10px; }
    .q-end-score { font-family: 'Cinzel', serif; font-size: 48px; color: var(--yellow); margin-bottom: 4px; }
    .q-end-sub   { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
    .q-end-prize { font-family: 'Cinzel', serif; font-size: 16px; color: var(--gold); margin-bottom: 16px; }
    .q-end-verse {
      font-size: 14px;
      color: rgba(201,168,76,0.85);
      font-style: italic;
      margin: 0 0 28px;
      line-height: 1.7;
      padding: 14px 18px;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      border-left: 3px solid rgba(201,168,76,0.4);
      max-width: 440px;
    }
    .q-end-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
    .q-restart {
      padding: 13px 24px;
      background: linear-gradient(135deg, var(--red-mid), var(--red-dark));
      border: 1px solid var(--gold);
      border-radius: 8px;
      color: var(--gold-lt);
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: .06em;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      width: 100%;
    }
    .q-restart:hover { opacity: .85; transform: translateY(-1px); }
    .q-restart-menu {
      background: transparent;
      border-color: rgba(201,168,76,0.35);
      color: rgba(201,168,76,0.7);
    }
    .q-restart-menu:hover { background: rgba(201,168,76,0.08); opacity: 1; }

    /* ── FOOTER ── */
    .game-footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      text-align: center;
      font-family: 'Cinzel', serif;
      letter-spacing: .06em;
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 480px) {
      .q-options { grid-template-columns: 1fr; }
      .q-levels  { grid-template-columns: 1fr; }
      .q-start, .q-end { padding: 36px 20px; }
      .q-body { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="game-header">
    <a href="index.html" class="game-logo">
      <span class="cross"><img src="logo.png" alt="Logo IEADA"></span>
      <div>
        <span class="brand">IEADA Bible Game</span>
        <span class="sub">Assembleia de Deus – Ágape</span>
      </div>
    </a>
    <a href="index.html" class="back-btn">← Voltar ao Site</a>
  </div>

  <div id="quiz-root"></div>

  <div class="game-footer">✝ IEADA – Assembleia de Deus Ágape © 2026</div>

  <script>
    const PRIZES = ["PT 1.000","PT 5.000","PT 10.000","PT 50.000","PT 100.000","PT 500.000","PT 1.000.000"];

    const ALL_QUESTIONS = {
      facil: [
        { q:"Quem construiu a arca por ordem de Deus?", opts:["Moisés","Noé","Abraão","Salomão"], a:1, exp:"Gênesis 6:14 – Deus ordenou a Noé que construísse a arca para salvar sua família e os animais." },
        { q:"Quantos dias Deus levou para criar o mundo?", opts:["3 dias","5 dias","6 dias","7 dias"], a:2, exp:"Gênesis 1 – Deus criou tudo em 6 dias e descansou no 7º dia." },
        { q:"Quem foi engolido por um grande peixe?", opts:["Elias","Jonas","Paulo","Pedro"], a:1, exp:"Jonas 1:17 – Jonas foi engolido por um grande peixe e ficou três dias e três noites dentro dele." },
        { q:"Qual foi o primeiro homem criado por Deus?", opts:["Abel","Noé","Adão","Abraão"], a:2, exp:"Gênesis 2:7 – Deus formou o homem do pó da terra e o chamou de Adão." },
        { q:"Qual é o livro mais longo da Bíblia?", opts:["Gênesis","Isaías","Salmos","Jeremias"], a:2, exp:"O livro de Salmos possui 150 capítulos, sendo o mais longo da Bíblia." },
        { q:"Em que cidade Jesus nasceu?", opts:["Nazaré","Jerusalém","Belém","Jericó"], a:2, exp:"Lucas 2:4-7 – Jesus nasceu em Belém de Judá, como havia sido profetizado." },
        { q:"Quem negou Jesus três vezes?", opts:["João","Judas","Tiago","Pedro"], a:3, exp:"Mateus 26:75 – Pedro negou conhecer Jesus três vezes antes do galo cantar." },
        { q:"Qual discípulo traiu Jesus?", opts:["Pedro","Tomé","Judas Iscariotes","Filipe"], a:2, exp:"Mateus 26:14-16 – Judas Iscariotes traiu Jesus por trinta moedas de prata." },
        { q:"Quantos apóstolos Jesus escolheu?", opts:["7","10","12","14"], a:2, exp:"Lucas 6:13 – Jesus escolheu doze apóstolos para acompanhá-lo em seu ministério." },
        { q:"Qual é o versículo mais curto da Bíblia?", opts:["Orai!","Jesus chorou.","Louvai ao Senhor.","Amém."], a:1, exp:"João 11:35 – 'Jesus chorou' é considerado o versículo mais curto da Bíblia." },
        { q:"Quem viu a sarça ardente?", opts:["Abraão","Moisés","Elias","Josué"], a:1, exp:"Êxodo 3:2 – O Anjo do Senhor apareceu a Moisés em uma chama no meio da sarça." },

{ q:"Quem foi jogado na cova dos leões?", opts:["José","Daniel","Moisés","Elias"], a:1, exp:"Daniel 6:16 – Daniel foi lançado na cova dos leões por ordem do rei." },

{ q:"Quem era o pai de Davi?", opts:["Saul","Jessé","Samuel","Eli"], a:1, exp:"1 Samuel 16:1 – Davi era filho de Jessé, de Belém." },

{ q:"Quem foi vendido pelos irmãos?", opts:["Moisés","José","Davi","Daniel"], a:1, exp:"Gênesis 37:28 – José foi vendido por vinte moedas de prata." },

{ q:"Quem escreveu muitos Salmos?", opts:["Salomão","Moisés","Davi","Isaías"], a:2, exp:"Salmos 23:1 – Davi é autor de muitos salmos." },

{ q:"Quem foi a mãe de Samuel?", opts:["Sara","Ana","Rebeca","Raquel"], a:1, exp:"1 Samuel 1:20 – Ana deu à luz Samuel após orar ao Senhor." },

{ q:"Quem pediu um filho a Deus?", opts:["Ana","Maria","Sara","Marta"], a:0, exp:"1 Samuel 1:27 – Ana pediu um filho ao Senhor em oração." },

{ q:"Quem construiu o templo de Jerusalém?", opts:["Davi","Salomão","Saul","Elias"], a:1, exp:"1 Reis 6:1 – Salomão começou a construir o templo do Senhor." },

{ q:"Quem batizou Jesus?", opts:["Pedro","João Batista","Paulo","Tiago"], a:1, exp:"Mateus 3:13 – Jesus foi batizado por João no rio Jordão." },
        { q:"Quantos dias Jesus ficou no deserto sendo tentado?", opts:["7 dias","20 dias","40 dias","90 dias"], a:2, exp:"Mateus 4:2 – Jesus jejuou quarenta dias e quarenta noites no deserto." },
        { q:"Qual era a profissão de José, pai adotivo de Jesus?", opts:["Pescador","Carpinteiro","Pastor","Cobrador de impostos"], a:1, exp:"Marcos 6:3 – Jesus era chamado de filho do carpinteiro José." },
        { q:"Quem caminhou sobre as águas com Jesus?", opts:["Tiago","João","Pedro","Paulo"], a:2, exp:"Mateus 14:29 – Pedro saiu do barco e andou sobre as águas em direção a Jesus." },
        { q:"Qual foi o primeiro milagre de Jesus?", opts:["Cura de leproso","Multiplicação dos pães","Transformar água em vinho","Ressurreição de Lázaro"], a:2, exp:"João 2:1-11 – Jesus transformou água em vinho nas bodas de Caná da Galileia." },
        { q:"Qual animal falou com Balaão?", opts:["Serpente","Jumenta","Leão","Pomba"], a:1, exp:"Números 22:28 – O Senhor abriu a boca da jumenta e ela falou com Balaão." },
        { q:"Em qual monte Moisés recebeu os Dez Mandamentos?", opts:["Monte Carmelo","Monte Sinai","Monte Sião","Monte das Oliveiras"], a:1, exp:"Êxodo 19:20 – O Senhor desceu sobre o Monte Sinai e entregou os mandamentos a Moisés." },
        { q:"Quem sonhou com uma escada chegando ao céu?", opts:["José","Moisés","Abraão","Jacó"], a:3, exp:"Gênesis 28:12 – Jacó sonhou com uma escada apoiada na terra cujo topo tocava o céu." },
        { q:"Em qual jardim Jesus orou antes de ser preso?", opts:["Getsêmani","Éden","Siloé","Betânia"], a:0, exp:"Mateus 26:36 – Jesus foi com seus discípulos a um lugar chamado Getsêmani." },
        { q:"Qual era o nome do discípulo amado de Jesus?", opts:["Pedro","Tiago","Mateus","João"], a:3, exp:"João 21:20 – O discípulo amado era João, que se reclinou sobre Jesus na última ceia." },
        { q:"Quem foi o irmão mais velho de Moisés?", opts:["Josué","Calebe","Arão","Gideão"], a:2, exp:"Êxodo 7:7 – Arão era três anos mais velho que Moisés e seu porta-voz diante do faraó." }
      ],
      medio: [
        { q:"Quem escreveu a maior parte dos Salmos?", opts:["Salomão","Moisés","Davi","Asafe"], a:2, exp:"A maioria dos 150 Salmos tem Davi como autor, sendo ele o maior salmista da Bíblia." },
        { q:"Qual era a profissão de Pedro antes de seguir Jesus?", opts:["Carpinteiro","Pescador","Cobrador de impostos","Pastor"], a:1, exp:"Mateus 4:18 – Pedro e seu irmão André eram pescadores no mar da Galileia." },
        { q:"Quantos livros tem o Novo Testamento?", opts:["22","27","30","39"], a:1, exp:"O Novo Testamento possui 27 livros, desde Mateus até Apocalipse." },
        { q:"Qual foi a primeira praga enviada ao Egito?", opts:["Gafanhotos","Trevas","Água em sangue","Rãs"], a:2, exp:"Êxodo 7:20 – A primeira praga transformou as águas do Nilo em sangue." },
        { q:"Quem interpretou os sonhos do faraó no Egito?", opts:["Moisés","Abraão","José","Daniel"], a:2, exp:"Gênesis 41 – José interpretou os dois sonhos do faraó, prevendo 7 anos de fartura e 7 de fome." },
        { q:"Em qual rio Jesus foi batizado?", opts:["Eufrates","Nilo","Jordão","Mar Morto"], a:2, exp:"Mateus 3:13 – Jesus foi batizado por João Batista no rio Jordão." },
        { q:"Quem foi o primeiro rei de Israel?", opts:["Davi","Salomão","Saul","Samuel"], a:2, exp:"1 Samuel 10:24 – Saul foi ungido por Samuel como o primeiro rei de Israel." },
        { q:"Qual profeta foi levado ao céu num carro de fogo?", opts:["Eliseu","Elias","Ezequiel","Isaías"], a:1, exp:"2 Reis 2:11 – Elias subiu ao céu num redemoinho, com cavalos e carro de fogo." },
        { q:"Qual é o livro central da Bíblia?", opts:["Salmos","Provérbios","Eclesiastes","Jó"], a:0, exp:"O livro de Salmos está no centro da Bíblia e é o livro mais longo." },
        { q:"Quem era irmão de Pedro?", opts:["João","André","Tiago","Tomé"], a:1, exp:"Mateus 4:18 – André era irmão de Simão Pedro." },

{ q:"Quem enfrentou os profetas de Baal?", opts:["Eliseu","Elias","Isaías","Jeremias"], a:1, exp:"1 Reis 18:22 – Elias confrontou os profetas de Baal." },

{ q:"Quem foi o pai de João Batista?", opts:["José","Zacarias","Eli","Arão"], a:1, exp:"Lucas 1:13 – Zacarias foi informado que teria um filho chamado João." },

{ q:"Quem sucedeu Moisés?", opts:["Calebe","Josué","Arão","Samuel"], a:1, exp:"Josué 1:1 – Josué assumiu a liderança após a morte de Moisés." },

{ q:"Quem foi lançado na cisterna pelos irmãos?", opts:["José","Jeremias","Daniel","Elias"], a:0, exp:"Gênesis 37:24 – José foi lançado numa cisterna vazia." },

{ q:"Quem escreveu a maioria das cartas do Novo Testamento?", opts:["Pedro","Paulo","João","Tiago"], a:1, exp:"Romanos 1:1 – Paulo é autor de várias epístolas do Novo Testamento." },

{ q:"Quem duvidou da ressurreição de Jesus?", opts:["Pedro","Tomé","João","Tiago"], a:1, exp:"João 20:25 – Tomé disse que só creria vendo." },

{ q:"Quem julgou Jesus?", opts:["Herodes","Pilatos","César","Faraó"], a:1, exp:"Mateus 27:24 – Pilatos declarou-se inocente do sangue de Jesus." },

        { q:"Qual profetisa liderou Israel junto ao general Barac?", opts:["Hulda","Miriã","Débora","Ana"], a:2, exp:"Juízes 4:4 – Débora era profetisa e juíza de Israel, e liderou junto a Barac contra Sísera." },
        { q:"Em que cidade Jesus realizou seu primeiro milagre?", opts:["Jerusalém","Belém","Caná da Galileia","Nazaré"], a:2, exp:"João 2:1 – Jesus realizou seu primeiro sinal em Caná da Galileia, transformando água em vinho." },
        { q:"Qual era o nome do filho de Davi que se rebelou contra ele?", opts:["Salomão","Absalão","Adonias","Amnom"], a:1, exp:"2 Samuel 15:10 – Absalão enviou espiões por todas as tribos de Israel para proclamar-se rei." },
        { q:"Quantos livros tem a Bíblia completa?", opts:["60","63","66","72"], a:2, exp:"A Bíblia possui 66 livros no total: 39 no Antigo Testamento e 27 no Novo Testamento." },
        { q:"Quem liderou a rebelião contra Moisés no deserto e foi engolido pela terra?", opts:["Corá","Miriã","Arão","Balaque"], a:0, exp:"Números 16:32 – A terra abriu a boca e tragou Corá, Datã e Abirão por se rebelarem contra Moisés." },
        { q:"Qual é o nome do sumo sacerdote que julgou Jesus?", opts:["Anás","Caifás","Herodes","Simão"], a:1, exp:"Mateus 26:57 – Os que prenderam Jesus o levaram a Caifás, o sumo sacerdote." },
        { q:"Quantas virgens sábias havia na parábola das dez virgens?", opts:["3","5","7","8"], a:1, exp:"Mateus 25:2 – Das dez virgens, cinco eram sábias e cinco eram tolas." },
        { q:"Quem pregou no Pentecostes e converteu cerca de 3.000 pessoas?", opts:["Paulo","João","Pedro","Tiago"], a:2, exp:"Atos 2:41 – Os que receberam a pregação de Pedro foram batizados: cerca de três mil almas." },
        { q:"Qual rei de Israel se casou com Jezabel?", opts:["Davi","Salomão","Acabe","Jeú"], a:2, exp:"1 Reis 16:31 – Acabe tomou por mulher Jezabel, filha de Etbaal, rei dos sidônios." }
      ],
      dificil: [
        { q:"Qual era o nome da esposa de Abraão antes de ser renomeada?", opts:["Raquel","Sara","Sarai","Rebeca"], a:2, exp:"Gênesis 17:15 – O nome original era Sarai, mas Deus a renomeou para Sara." },
        { q:"Quantos anos Matusalém viveu, segundo a Bíblia?", opts:["777","900","969","999"], a:2, exp:"Gênesis 5:27 – Matusalém viveu 969 anos, sendo o homem mais velho registrado na Bíblia." },
        { q:"Qual rei mandou construir o primeiro templo de Jerusalém?", opts:["Davi","Salomão","Roboão","Ezequias"], a:1, exp:"1 Reis 6:1 – Salomão construiu o templo em Jerusalém, levando 7 anos para terminá-lo." },
        { q:"Qual é o único livro da Bíblia que não menciona o nome de Deus?", opts:["Ester","Rute","Cantares","Filemom"], a:0, exp:"O livro de Ester é famoso por não mencionar explicitamente o nome de Deus em nenhum versículo." },
        { q:"Quantas cartas o apóstolo Paulo escreveu no Novo Testamento?", opts:["11","13","14","15"], a:1, exp:"Paulo escreveu 13 cartas: Romanos, 1-2 Coríntios, Gálatas, Efésios, Filipenses, Colossenses, 1-2 Tessalonicenses, 1-2 Timóteo, Tito e Filemom." },
        { q:"Qual profeta profetizou que o Messias nasceria em Belém?", opts:["Isaías","Miquéias","Zacarias","Amós"], a:1, exp:"Miquéias 5:2 – 'E tu, Belém Efrata... de ti me sairá aquele que será soberano em Israel'." },
        { q:"Qual era o nome hebraico do apóstolo Paulo?", opts:["Barnabé","Silas","Saulo","Timóteo"], a:2, exp:"Atos 13:9 – Paulo era conhecido pelo nome hebraico Saulo antes de ser chamado Paulo." },
        { q:"Quantos livros tem o Antigo Testamento?", opts:["36","39","40","45"], a:1, exp:"O Antigo Testamento possui 39 livros, desde Gênesis até Malaquias." },
        { q:"Qual foi a cidade destruída junto com Sodoma?", opts:["Jericó","Gomorra","Nínive","Babel"], a:1, exp:"Gênesis 19:24 – Deus destruiu Sodoma e Gomorra com enxofre e fogo do céu." },
        { q:"Quem escreveu o livro do Apocalipse?", opts:["Paulo","Pedro","Tiago","João"], a:3, exp:"Apocalipse 1:1 – João recebeu e escreveu a revelação enquanto estava na ilha de Patmos." },
         { q:"Quem foi o rei que lançou Daniel na cova dos leões?", opts:["Nabucodonosor","Dario","Ciro","Saul"], a:1, exp:"Daniel 6:16 – O rei Dario ordenou que Daniel fosse lançado na cova." },

{ q:"Quem foi o pai de Abraão?", opts:["Terá","Naor","Ló","Isaque"], a:0, exp:"Gênesis 11:26 – Terá gerou Abrão (Abraão)." },

{ q:"Qual é o último livro da Bíblia?", opts:["Judas","Apocalipse","Hebreus","Atos"], a:1, exp:"Apocalipse 22:21 – Último livro do Novo Testamento." },

{ q:"Quem nunca morreu segundo a Bíblia?", opts:["Elias","Enoque","Ambos","Nenhum"], a:2, exp:"Gênesis 5:24 e 2 Reis 2:11 – Enoque e Elias foram levados por Deus." },

{ q:"Quem escreveu Gênesis?", opts:["Abraão","Moisés","Davi","Samuel"], a:1, exp:"Gênesis 1:1 – Tradicionalmente atribuído a Moisés." },

{ q:"Qual o menor livro da Bíblia?", opts:["Filemom","2 João","3 João","Judas"], a:2, exp:"3 João 1:1 – Possui menos versículos no Novo Testamento." },

{ q:"Quem teve a visão dos ossos secos?", opts:["Isaías","Ezequiel","Jeremias","Daniel"], a:1, exp:"Ezequiel 37:1 – Deus mostrou o vale de ossos secos." },

{ q:"Quem foi o pai de João Batista?", opts:["Zacarias","José","Eli","Arão"], a:0, exp:"Lucas 1:13 – Zacarias recebeu a promessa do nascimento de João." },

{ q:"Quem escreveu Provérbios?", opts:["Davi","Salomão","Moisés","Isaías"], a:1, exp:"Provérbios 1:1 – Provérbios de Salomão, filho de Davi." },

{ q:"Quem foi o rei mais sábio?", opts:["Davi","Salomão","Saul","Josias"], a:1, exp:"1 Reis 4:29 – Deus deu sabedoria extraordinária a Salomão." },
        { q:"Qual era a profissão de Lucas, autor do terceiro Evangelho?", opts:["Pescador","Médico","Cobrador de impostos","Carpinteiro"], a:1, exp:"Colossenses 4:14 – Lucas é chamado de 'o médico amado' pelo apóstolo Paulo." },
        { q:"Qual era o nome do servo a quem Pedro cortou a orelha?", opts:["Anás","Malco","Marcos","Simeão"], a:1, exp:"João 18:10 – Simão Pedro tirou a espada e feriu o servo do sumo sacerdote, chamado Malco." },
        { q:"Quantos anos viveu Noé?", opts:["750 anos","850 anos","950 anos","1000 anos"], a:2, exp:"Gênesis 9:29 – Todos os dias de Noé foram novecentos e cinquenta anos." },
        { q:"Qual era o nome da rainha que visitou Salomão para testar sua sabedoria?", opts:["Rainha do Egito","Rainha de Sabá","Rainha da Babilônia","Rainha da Pérsia"], a:1, exp:"1 Reis 10:1 – A rainha de Sabá ouviu a fama de Salomão e veio testá-lo com perguntas difíceis." },
        { q:"Quantos anos tinha Josué quando morreu?", opts:["100 anos","110 anos","120 anos","130 anos"], a:1, exp:"Josué 24:29 – Josué, filho de Num, morreu com cento e dez anos de idade." },
        { q:"Qual era o nome babilônico dado a Daniel?", opts:["Beltessazar","Sadraque","Mesaque","Abede-Nego"], a:0, exp:"Daniel 1:7 – O chefe dos oficiais deu ao príncipe Daniel o nome de Beltessazar." },
        { q:"Quem era o pai da esposa de Moisés, Zípora?", opts:["Jetro","Aminadabe","Naor","Ló"], a:0, exp:"Êxodo 3:1 – Moisés apascentava as ovelhas de Jetro, seu sogro, sacerdote de Midiã." },
        { q:"Em qual ilha o apóstolo João recebeu a visão do Apocalipse?", opts:["Chipre","Malta","Creta","Patmos"], a:3, exp:"Apocalipse 1:9 – João estava na ilha chamada Patmos por causa da Palavra de Deus." },
        { q:"Quantas pragas Deus enviou ao Egito?", opts:["7","8","10","12"], a:2, exp:"Êxodo 7–12 – Deus enviou dez pragas ao Egito para libertar Israel da escravidão." },
        { q:"A esposa de Ló virou estátua de quê ao olhar para trás?", opts:["Pedra","Sal","Gelo","Pó"], a:1, exp:"Gênesis 19:26 – A mulher de Ló olhou para trás e tornou-se uma estátua de sal." }
      ]
    };

    const END_VERSES = [
      { t:"Continue estudando a Palavra!", v:'"Lâmpada para os meus pés é tua palavra, e luz para o meu caminho." — Salmos 119:105' },
      { t:"Bom resultado! Continue crescendo!", v:'"A lei do teu Deus está no meu coração." — Salmos 37:31' },
      { t:"Excelente! Verdadeiro estudioso da Bíblia!", v:'"Esforça-te, e tem bom ânimo; não temas, nem te espantes." — Josué 1:9' },
    ];

    let state = { screen:"start", level:"facil", questions:[], current:0, score:0, answeredCount:0, ll:{ skip:true, half:true, bible:true } };

    function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

    function startGame(level) {
      const BATCH   = 10;
      const isTotal = level === 'total';

      const sourceQ = isTotal
        ? [...ALL_QUESTIONS.facil, ...ALL_QUESTIONS.medio, ...ALL_QUESTIONS.dificil]
        : ALL_QUESTIONS[level];

      const key  = 'usedQ_' + level;
      let used   = JSON.parse(localStorage.getItem(key) || '[]');

      let available = sourceQ
        .map((q, i) => ({ q, i }))
        .filter(({ i }) => !used.includes(i));

      const minNeeded = isTotal ? 1 : BATCH;
      if (available.length < minNeeded) {
        used = [];
        available = sourceQ.map((q, i) => ({ q, i }));
      }

      const picked = isTotal ? shuffle(available) : shuffle(available).slice(0, BATCH);
      localStorage.setItem(key, JSON.stringify([...used, ...picked.map(p => p.i)]));

      state = {
        screen: "game", level,
        questions: picked.map(p => p.q),
        current: 0, score: 0, answeredCount: 0,
        ll: { skip: true, half: true, bible: true }
      };
      render();
    }

    function render() {
      const root    = document.getElementById("quiz-root");
      if (state.screen === "start") { root.innerHTML = renderStart(); return; }
      if (state.screen === "end")   { root.innerHTML = renderEnd();   return; }
      const q       = state.questions[state.current];
      const isTotal = state.level === 'total';
      const pct     = ((state.current) / state.questions.length * 100).toFixed(0);

      const metaNum = isTotal
        ? '<div class="q-number">Pergunta ' + (state.current+1) + '</div>'
        : '<div class="q-number">Pergunta ' + (state.current+1) + ' de ' + state.questions.length + '</div>';

      const metaPrize = isTotal
        ? '<div class="q-prize">✔ ' + state.score + ' acerto' + (state.score !== 1 ? 's' : '') + '</div>'
        : '<div class="q-prize">' + PRIZES[Math.min(state.current, PRIZES.length-1)] + '</div>';

      const nextBtns = isTotal
        ? '<div id="nextBtn" style="display:none">' +
            '<div class="q-next-row">' +
              '<button class="q-next" onclick="endGame()">⏹ Encerrar</button>' +
              '<button class="q-next grow2" onclick="nextQ()">Próxima Pergunta →</button>' +
            '</div>' +
          '</div>'
        : '<button class="q-next" id="nextBtn" onclick="nextQ()">' +
            (state.current+1 < state.questions.length ? "Próxima Pergunta →" : "Ver Resultado") +
          '</button>';

      root.innerHTML =
        '<div class="q-header">' +
          '<button class="q-menu-btn" onclick="goStart()">← Menu</button>' +
          '<div class="q-header-logo">' +
            '<span class="q-header-cross">✝</span>' +
            '<div><div class="q-header-brand">IEADA Bible Game<span>Assembleia de Deus – IEADA</span></div></div>' +
          '</div>' +
          '<div class="q-score-box">Pontos: ' + state.score + '</div>' +
        '</div>' +
        '<div class="q-body">' +
          '<div class="q-progress-bar"><div class="q-progress-fill" style="width:' + pct + '%"></div></div>' +
          '<div class="q-meta">' + metaNum + metaPrize + '</div>' +
          '<div class="q-text">' + q.q + '</div>' +
          '<div class="q-lifelines">' +
            '<button class="q-ll" id="ll-skip" ' + (!state.ll.skip?"disabled":"") + ' onclick="useSkip()"><span class="ll-icon">⏭</span>Pular</button>' +
            '<button class="q-ll" id="ll-half" ' + (!state.ll.half?"disabled":"") + ' onclick="useHalf()"><span class="ll-icon">✂️</span>50/50</button>' +
            '<button class="q-ll" id="ll-bible" ' + (!state.ll.bible?"disabled":"") + ' onclick="useBible()"><span class="ll-icon">📖</span>Bíblia</button>' +
          '</div>' +
          '<div class="q-options" id="opts">' +
            q.opts.map((o,i)=>'<button class="q-opt" id="opt-'+i+'" onclick="answer('+i+')">' +
              '<span class="opt-letter">'+["A","B","C","D"][i]+'</span>'+o+'</button>').join("") +
          '</div>' +
          '<div class="q-feedback" id="feedback"></div>' +
          nextBtns +
        '</div>';
    }

    function renderStart() {
      return '<div class="q-start">' +
        '<div class="q-start-cross">✝</div>' +
        '<div class="q-start-title">ÁGAPE Bible Game</div>' +
        '<div class="q-start-sub">Quiz Bíblico</div>' +
        '<div class="q-start-brand">Assembleia de Deus – ÁGAPE</div>' +
        '<div class="q-levels">' +
          '<button class="q-level-btn" onclick="startGame(\'facil\')"><span class="lv-icon">📖</span><span class="lv-name">Fácil</span><span class="lv-desc">Iniciante</span></button>' +
          '<button class="q-level-btn" onclick="startGame(\'medio\')"><span class="lv-icon">✝</span><span class="lv-name">Médio</span><span class="lv-desc">Intermediário</span></button>' +
          '<button class="q-level-btn" onclick="startGame(\'dificil\')"><span class="lv-icon">🏆</span><span class="lv-name">Difícil</span><span class="lv-desc">Avançado</span></button>' +
          '<button class="q-level-btn q-level-total" onclick="startGame(\'total\')"><span class="lv-icon">🔥</span><span class="lv-name">Desafio Total</span><span class="lv-desc">Fácil ao Difícil • Pare quando quiser</span></button>' +
        '</div>' +
        '<div class="q-start-hint">10 perguntas por rodada • 3 ajudas disponíveis</div>' +
      '</div>';
    }

    function renderEnd() {
      const isTotal  = state.level === 'total';
      const answered = isTotal ? state.answeredCount : state.questions.length;
      const pct      = answered > 0 ? Math.round((state.score / answered) * 100) : 0;
      const icon     = pct >= 80 ? "🏆" : pct >= 50 ? "✝" : "📖";
      const ev       = END_VERSES[pct >= 80 ? 2 : pct >= 50 ? 1 : 0];
      const prizeRow = isTotal
        ? '<div class="q-end-prize">' + answered + ' perguntas respondidas</div>'
        : '<div class="q-end-prize">' + PRIZES[Math.min(state.score, PRIZES.length-1)] + '</div>';
      return '<div class="q-end">' +
        '<div class="q-end-icon">' + icon + '</div>' +
        '<div class="q-end-title">' + ev.t + '</div>' +
        '<div class="q-end-score">' + state.score + '/' + answered + '</div>' +
        '<div class="q-end-sub">' + pct + '% de acertos</div>' +
        prizeRow +
        '<div class="q-end-verse">' + ev.v + '</div>' +
        '<div class="q-end-btns">' +
          '<button class="q-restart" onclick="startGame(state.level)">Jogar Novamente</button>' +
          '<button class="q-restart q-restart-menu" onclick="goStart()">← Escolher Nível</button>' +
        '</div>' +
      '</div>';
    }

    function answer(i) {
      const q = state.questions[state.current];
      document.querySelectorAll(".q-opt").forEach(o => o.disabled = true);
      document.querySelectorAll(".q-ll").forEach(l => l.disabled = true);
      const fb = document.getElementById("feedback");
      fb.style.display = "block";
      if (i === q.a) {
        document.getElementById("opt-"+i).classList.add("correct");
        state.score++;
        fb.style.borderLeftColor = "#1d9e75";
        fb.innerHTML = "✔ Correto! " + q.exp;
      } else {
        document.getElementById("opt-"+i).classList.add("wrong");
        document.getElementById("opt-"+q.a).classList.add("correct");
        fb.style.borderLeftColor = "#e24b4a";
        fb.innerHTML = "✘ Incorreto. " + q.exp;
      }
      state.answeredCount++;
      document.getElementById("nextBtn").style.display = "block";
    }

    function nextQ() {
      state.current++;
      if (state.current >= state.questions.length) state.screen = "end";
      render();
    }

    function goStart() { state.screen = "start"; render(); }

    function endGame() { state.screen = "end"; render(); }

    function useSkip() {
      if (!state.ll.skip) return;
      state.ll.skip = false;
      state.current++;
      if (state.current >= state.questions.length) state.screen = "end";
      render();
    }

    function useHalf() {
      if (!state.ll.half) return;
      state.ll.half = false;
      const q = state.questions[state.current];
      const wrong = [0,1,2,3].filter(i => i !== q.a);
      shuffle(wrong).slice(0,2).forEach(i => {
        const btn = document.getElementById("opt-"+i);
        if (btn) { btn.style.opacity = "0.18"; btn.disabled = true; }
      });
      document.getElementById("ll-half").disabled = true;
    }

    function useBible() {
      if (!state.ll.bible) return;
      state.ll.bible = false;
      const q = state.questions[state.current];
      const fb = document.getElementById("feedback");
      fb.style.display = "block";
      fb.style.borderLeftColor = "rgba(201,168,76,0.5)";
      fb.innerHTML = "📖 Dica bíblica: " + q.exp;
      document.getElementById("ll-bible").disabled = true;
    }

    render();
  </script>
</body>
